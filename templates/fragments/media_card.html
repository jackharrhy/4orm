<article
  id="media-{{ item.id }}"
  class="card"
  style="background: #fff; border-style: solid"
>
  {% if item.mime_type.startswith('image/') %}
    <img
      src="/uploads/{{ item.storage_path }}"
      alt="{{ item.alt_text }}"
      style="max-width: 100%; border: 1px solid #000"
    />
  {% elif item.mime_type.startswith('video/') %}
    <video
      controls
      src="/uploads/{{ item.storage_path }}"
      style="max-width: 100%; border: 1px solid #000"
    ></video>
  {% else %}
    <p><a href="/uploads/{{ item.storage_path }}">download file</a></p>
  {% endif %}
  <p class="muted">{{ item.mime_type }} · {{ item.size_bytes|human_bytes }}</p>
  <p><code>/uploads/{{ item.storage_path }}</code></p>
  <form
    method="post"
    action="/settings/media/{{ item.id }}/rename"
    class="stack"
    hx-post="/settings/media/{{ item.id }}/rename"
    hx-target="#media-{{ item.id }}"
    hx-swap="outerHTML"
  >
    <label>
      filename
      <input
        name="filename"
        value="{{ item.storage_path.split('/')[-1] }}"
        required
      />
    </label>
    <button type="submit">rename file</button>
  </form>
  <form
    method="post"
    action="/settings/media/{{ item.id }}/alt"
    class="stack"
    hx-post="/settings/media/{{ item.id }}/alt"
    hx-target="#media-{{ item.id }}"
    hx-swap="outerHTML"
  >
    <label>
      alt text
      <input name="alt_text" value="{{ item.alt_text }}" />
    </label>
    <button type="submit">save alt</button>
  </form>
  <form
    method="post"
    action="/settings/media/{{ item.id }}/delete"
    class="inline"
    hx-post="/settings/media/{{ item.id }}/delete"
    hx-target="#media-{{ item.id }}"
    hx-swap="outerHTML"
    hx-confirm="Delete this media?"
  >
    <button type="submit">delete</button>
  </form>
</article>
