<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}4orm{% endblock %}</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>"
    />
    <link rel="stylesheet" href="/static/style.css?v={{ css_hash }}" />
    <link rel="manifest" href="/static/manifest.json" />
    <meta name="theme-color" content="#00ccff" />
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  </head>
  <body
    hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'
    data-csrf-token="{{ csrf_token }}"
    data-vapid-key="{{ vapid_public_key }}"
    data-logged-in="{{ 'true' if me else 'false' }}"
  >
    <header class="topbar">
      <a href="/" class="logo">4orm</a>
      <nav>
        <a href="/forum">forum</a>
        <a href="/chat">chat</a>
        {% if me %}
          <a href="/u/{{ me.username }}">my page</a>
          <a href="/settings">settings</a>
          {% if me.is_admin %}
            <a href="/admin">admin</a>
          {% endif %}
          <form method="post" action="/logout" class="inline">
            <button>logout</button>
          </form>
        {% else %}
          <a href="/login">login</a>
          <a href="/register">register</a>
        {% endif %}
      </nav>
    </header>
    <main class="wrap">{% block content %}{% endblock %}</main>
    <script src="/static/app.js?v={{ app_hash }}"></script>
  </body>
</html>
