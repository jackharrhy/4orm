{% macro media_snippet_picker(media_items, textarea_id, format="html", selected_path="") %}
  <div class="media-picker" id="media-picker-{{ textarea_id }}">
    <div class="media-picker-row">
      <div class="media-picker-select">
        {% if media_items %}
          <select id="media-select-{{ textarea_id }}" onchange="updateMediaButtons('{{ textarea_id }}')">
            {% for item in media_items %}
              <option
                value="{{ item.storage_path }}"
                data-mime="{{ item.mime_type or '' }}"
                data-alt="{{ item.alt_text or '' }}"
              {% if selected_path and item.storage_path == selected_path %}selected{% endif %}
              >{{ item.storage_path.split('/')[-1] }}</option>
            {% endfor %}
          </select>
          <div class="inline" style="flex-wrap: wrap; gap: 2px; margin-top: 4px" id="media-buttons-{{ textarea_id }}">
            <button type="button" class="btn-sm media-btn-img" onclick="insertMediaSnippet('{{ textarea_id }}', 'img')">img</button>
            <button type="button" class="btn-sm media-btn-linked-img" onclick="insertMediaSnippet('{{ textarea_id }}', 'linked-img')">linked img</button>
            <button type="button" class="btn-sm media-btn-video" onclick="insertMediaSnippet('{{ textarea_id }}', 'video')">video</button>
            <button type="button" class="btn-sm media-btn-audio" onclick="insertMediaSnippet('{{ textarea_id }}', 'audio')">audio</button>
            <button type="button" class="btn-sm" onclick="insertMediaSnippet('{{ textarea_id }}', 'link')">link</button>
          </div>
        {% else %}
          <p class="muted" style="margin: 0; font-size: 0.85rem">no media yet — upload one →</p>
        {% endif %}
      </div>
      <div class="media-picker-upload">
        <form
          method="post"
          action="/api/media/quick-upload"
          enctype="multipart/form-data"
          hx-post="/api/media/quick-upload"
          hx-target="#media-picker-{{ textarea_id }}"
          hx-swap="outerHTML"
          hx-encoding="multipart/form-data"
        >
          <input type="hidden" name="picker_textarea_id" value="{{ textarea_id }}" />
          <input type="hidden" name="picker_format" value="{{ format }}" />
          {% if media_items %}
            <input type="hidden" name="picker_select_file" value="" id="picker-select-file-{{ textarea_id }}" />
          {% endif %}
          <input type="file" name="file" required style="font-size: 0.8rem; max-width: 160px" />
          <button type="submit" class="btn-sm" style="margin-top: 4px">upload</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var format = "{{ format }}";
      window._mediaFormat = window._mediaFormat || {};
      window._mediaFormat["{{ textarea_id }}"] = format;

      window.updateMediaButtons =
        window.updateMediaButtons ||
        function (textareaId) {
          var sel = document.getElementById("media-select-" + textareaId);
          if (!sel) return;
          var opt = sel.options[sel.selectedIndex];
          var mime = opt.dataset.mime || "";
          var wrap = document.getElementById("media-buttons-" + textareaId);
          if (!wrap) return;
          var isImg = mime.startsWith("image/");
          var isVid = mime.startsWith("video/");
          var isAud = mime.startsWith("audio/");
          wrap.querySelector(".media-btn-img").style.display = isImg ? "" : "none";
          wrap.querySelector(".media-btn-linked-img").style.display = isImg ? "" : "none";
          wrap.querySelector(".media-btn-video").style.display = isVid ? "" : "none";
          wrap.querySelector(".media-btn-audio").style.display = isAud ? "" : "none";
        };

      window.insertMediaSnippet =
        window.insertMediaSnippet ||
        function (textareaId, type) {
          var sel = document.getElementById("media-select-" + textareaId);
          var path = "/uploads/" + sel.value;
          var alt = sel.options[sel.selectedIndex].dataset.alt || "";
          var fmt = window._mediaFormat[textareaId] || "html";
          var snippet = "";
          if (fmt === "bbcode") {
            if (type === "img") snippet = "[img]" + path + "[/img]";
            else if (type === "linked-img") snippet = "[url=" + path + "][img]" + path + "[/img][/url]";
            else if (type === "video") snippet = "[video]" + path + "[/video]";
            else if (type === "audio") snippet = "[audio]" + path + "[/audio]";
            else snippet = "[url=" + path + "]" + sel.options[sel.selectedIndex].text + "[/url]";
          } else {
            if (type === "img") snippet = '<img src="' + path + '" alt="' + alt + '" />';
            else if (type === "linked-img") snippet = '<a href="' + path + '"><img src="' + path + '" alt="' + alt + '" /></a>';
            else if (type === "video") snippet = '<video controls src="' + path + '"></video>';
            else if (type === "audio") snippet = '<audio controls src="' + path + '"></audio>';
            else snippet = '<a href="' + path + '">download</a>';
          }
          var cm = window._cmEditors && window._cmEditors[textareaId];
          if (cm) {
            var pos = cm.state.selection.main.head;
            cm.dispatch({ changes: { from: pos, insert: snippet } });
            cm.focus();
            return;
          }
          var ta = document.getElementById(textareaId);
          if (!ta) return;
          var start = ta.selectionStart || 0;
          var end = ta.selectionEnd || 0;
          ta.value = ta.value.substring(0, start) + snippet + ta.value.substring(end);
          ta.selectionStart = ta.selectionEnd = start + snippet.length;
          ta.focus();
        };

      {% if media_items %}
        updateMediaButtons("{{ textarea_id }}");
      {% endif %}
    })();
  </script>
{% endmacro %}
