{% macro layout_select(current='default') %}
  {%
    set options = {
      'default': 'topbar, panels, structured content',
      'simple': 'topbar only, blank page',
      'raw': 'full HTML, no template',
    }
  %}
  <label>
    layout
    <select name="layout">
      {% for value, desc in options.items() %}
        <option
          value="{{ value }}"
          {% if current == value %}selected{% endif %}
        >
          {{ value }} - {{ desc }}
        </option>
      {% endfor %}
    </select>
  </label>
{% endmacro %}
