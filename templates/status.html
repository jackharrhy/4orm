<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @layer base {
        body {
          margin: 0;
          padding: 0;
          font-family: Verdana, Tahoma, sans-serif;
          font-size: 12px;
          background: transparent;
        }
        .status {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          padding: 4px 8px;
        }
        .status-emoji {
          font-size: 16px;
        }
        .status-text {
          color: #333;
        }
        .status-time {
          color: #999;
          font-size: 11px;
        }
      }
      {{ owner.status_css|safe }}
    </style>
  </head>
  <body>
    {% if owner.status_text or owner.status_emoji %}
      <div class="status">
        {% if owner.status_emoji %}
          <span class="status-emoji">{{ owner.status_emoji }}</span>
        {% endif %}
        {% if owner.status_text %}
          <span class="status-text">{{ owner.status_text }}</span>
        {% endif %}
        {% if relative_time %}
          <span class="status-time">· {{ relative_time }}</span>
        {% endif %}
      </div>
    {% endif %}
    {{ owner.status_html|safe }}
  </body>
</html>
