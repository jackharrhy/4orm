{% extends 'base.html' %}
{% from 'macros/custom_assets.html' import inject_custom_assets %}
{% block title %}{{ page.title }}{% endblock %}
{% block content %}
  {{ inject_custom_assets(page) }}
  <article class="panel content-html">
    <h1>{{ page.title }}</h1>
    <p class="muted">
      by <a href="/u/{{ page.username }}">{{ page.display_name }}</a>
    </p>
    <hr />
    {{ rendered_content|safe }}
  </article>
{% endblock %}
