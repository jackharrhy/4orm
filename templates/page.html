{% extends 'base.html' %}
{% block title %}{{ page.title }}{% endblock %}
{% block content %}
  <!-- prettier-ignore-start -->
  {% if page.custom_css %}<style>{{ page.custom_css|safe }}</style>{% endif %}
  <!-- prettier-ignore-end -->
  <article class="panel content-html">
    <h1>{{ page.title }}</h1>
    <p class="muted">
      by <a href="/u/{{ page.username }}">{{ page.display_name }}</a>
    </p>
    <hr />
    {{ page.content_html|safe }}
  </article>
{% endblock %}
