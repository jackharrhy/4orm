{% extends "base.html" %}
{% from "macros/media_snippets.html" import media_snippet_picker %}

{% block title %}4orm · edit post{% endblock %}

{% block content %}
  <h1>edit post</h1>

  <form method="post" action="/forum/posts/{{ post.id }}/edit" class="stack">
    <label>
      format (<a
        href="https://www.phpbb.com/community/help/bbcode"
        target="_blank"
        >BBCode?</a
      >):
      <select
        name="content_format"
        onchange="if(window._mediaFormat)window._mediaFormat['edit-post-content']=this.value"
      >
        <option
          value="bbcode"
          {% if post.content_format == 'bbcode' %}selected{% endif %}
        >
          BBCode
        </option>
        <option
          value="markdown"
          {% if post.content_format == 'markdown' %}selected{% endif %}
        >
          Markdown
        </option>
      </select>
    </label>

    <label>
      content
      <textarea name="content" id="edit-post-content" rows="10" required>
{{ post.content }}</textarea
      >
    </label>

    {{ media_snippet_picker(media_items, 'edit-post-content', format='bbcode') }}

    <div class="inline" style="gap: 6px; margin-top: 4px">
      <button type="submit">save</button>
      <button
        type="button"
        class="btn-sm"
        onclick="previewPost('edit-post-content')"
      >
        preview
      </button>
    </div>
    <div
      id="preview-edit-post-content"
      class="forum-preview"
      style="display: none"
    ></div>
  </form>

  <p style="margin-top: 8px">
    <a href="/forum/{{ post.thread_id }}">back to thread</a>
  </p>
{% endblock %}
