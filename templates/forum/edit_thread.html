{% extends "base.html" %}

{% block title %}4orm · edit thread{% endblock %}

{% block content %}
  <h1>edit thread</h1>

  <form method="post" action="/forum/{{ thread.id }}/edit" class="stack">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
    <label>
      title
      <input
        type="text"
        name="title"
        required
        maxlength="200"
        value="{{ thread.title }}"
      />
    </label>

    <label>
      custom CSS
      <textarea name="custom_css" rows="4">{{ thread.custom_css }}</textarea>
    </label>

    <label>
      custom HTML
      <textarea name="custom_html" rows="4">{{ thread.custom_html }}</textarea>
    </label>

    <button type="submit">save</button>
  </form>

  <p style="margin-top: 8px">
    <a href="/forum/{{ thread.id }}">back to thread</a>
  </p>
{% endblock %}
