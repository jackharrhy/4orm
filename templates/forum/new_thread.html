{% extends "base.html" %}
{% from "macros/media_snippets.html" import media_snippet_picker %}

{% block title %}4orm · new thread{% endblock %}

{% block content %}
  <h1>new thread</h1>

  <form method="post" action="/forum/new" class="stack">
    <label>
      title
      <input
        type="text"
        name="title"
        required
        maxlength="200"
        placeholder="thread title"
      />
    </label>

    <label>
      format (<a
        href="https://www.phpbb.com/community/help/bbcode"
        target="_blank"
        >BBCode?</a
      >):
      <select
        name="content_format"
        onchange="if(window._mediaFormat)window._mediaFormat['thread-content']=this.value"
      >
        <option value="bbcode" selected>BBCode</option>
        <option value="markdown">Markdown</option>
      </select>
    </label>

    <label>
      content
      <textarea
        name="content"
        id="thread-content"
        rows="10"
        required
        placeholder="write your post..."
      ></textarea>
    </label>

    {{ media_snippet_picker(media_items, 'thread-content', format='bbcode') }}

    <details class="panel">
      <summary><h2>thread styling</h2></summary>
      <div class="stack" style="margin-top: 8px">
        <label>
          custom CSS
          <textarea
            name="custom_css"
            rows="4"
            placeholder="CSS applied to this thread"
          ></textarea>
        </label>
        <label>
          custom HTML
          <textarea
            name="custom_html"
            rows="4"
            placeholder="HTML injected into this thread"
          ></textarea>
        </label>
      </div>
    </details>

    <div class="inline" style="gap: 6px; margin-top: 4px">
      <button type="submit">create thread</button>
      <button
        type="button"
        class="btn-sm"
        onclick="previewPost('thread-content')"
      >
        preview
      </button>
    </div>
    <div
      id="preview-thread-content"
      class="forum-preview"
      style="display: none"
    ></div>
  </form>
  <script>
    function previewPost(textareaId) {
      var ta = document.getElementById(textareaId);
      if (!ta || !ta.value.trim()) return;
      var form = ta.closest("form");
      var formatSel = form
        ? form.querySelector('select[name="content_format"]')
        : null;
      var fmt = formatSel ? formatSel.value : "bbcode";
      var preview = document.getElementById("preview-" + textareaId);
      if (!preview) return;
      var csrfEl = document.querySelector("body[hx-headers]");
      var csrf = "";
      if (csrfEl) {
        try {
          csrf =
            JSON.parse(csrfEl.getAttribute("hx-headers"))["X-CSRF-Token"] || "";
        } catch (e) {}
      }
      var fd = new FormData();
      fd.append("content", ta.value);
      fd.append("content_format", fmt);
      fetch("/forum/preview", {
        method: "POST",
        headers: csrf ? { "X-CSRF-Token": csrf } : {},
        body: fd,
      })
        .then(function (r) {
          return r.text();
        })
        .then(function (html) {
          preview.innerHTML = html;
          preview.style.display = "block";
        });
    }
  </script>
{% endblock %}
