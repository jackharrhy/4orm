name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build JS bundles
        run: npm run build

      - name: Check formatting
        run: uv run --group dev ruff format --check app/ tests/

      - name: Lint
        run: uv run --group dev ruff check app/ tests/

      - name: Run tests (zero warnings)
        run: uv run --group dev pytest tests/ -v -W error
